<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>资源页已移除</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        background:
          radial-gradient(circle at top, rgba(64, 158, 255, 0.18), transparent 45%),
          linear-gradient(180deg, #f5f7fa 0%, #eef2f7 100%);
        color: #303133;
      }

      main {
        width: min(560px, calc(100% - 32px));
        padding: 32px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.88);
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
        backdrop-filter: blur(18px);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }

      p {
        margin: 0 0 8px;
        line-height: 1.8;
        color: #606266;
      }

      a {
        color: #409eff;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>资源页已移除</h1>
      <p>该项目不再内置推广、导流或第三方资源聚合页面。</p>
      <p>如需继续使用订阅转换功能，请返回 <a href="/">主页</a>。</p>
    </main>
  </body>
</html>
